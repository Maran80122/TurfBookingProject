<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turf Booking - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #00ffae;
      --primary-dark: #00a86b;
      --secondary-color: #6e00ff;
      --text-light: #ffffff;
      --card-bg: rgba(0, 0, 0, 0.65);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    .bg-slide {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1);
      transition: opacity 1.5s ease-in-out, transform 10s ease;
      z-index: -2;
    }
    
    .bg-slide.active {
      opacity: 1;
      transform: scale(1.15);
    }
    
  
    
    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      position: relative;
    }
    
    .auth-card {
      width: 100%;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      color: var(--text-light);
      backdrop-filter: blur(12px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: floatUp 0.8s ease-out forwards;
      position: relative;
      overflow: hidden;
    }
    
    .auth-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 255, 174, 0.1) 0%, transparent 70%);
      transform: rotate(0deg);
      z-index: 0;
    }
    
    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .logo h1 {
      font-weight: 700;
      font-size: 28px;
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 5px;
    }
    
    .logo p {
      font-size: 14px;
      opacity: 0.8;
    }
    
    .auth-card h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      color: var(--primary-color);
      position: relative;
      padding-bottom: 10px;
    }
    
    .auth-card h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      border-radius: 3px;
    }
    
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .input-group-text {
      background: rgba(0, 0, 0, 0.2);
      border: none;
      color: var(--primary-color);
      border-top-left-radius: 20px;
      border-bottom-left-radius: 20px;
      padding: 0 20px;
    }
    
    .form-control {
      border-radius: 0 20px 20px 0;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff; /* Ensured white text color */
      border: none;
      padding: 12px 15px;
      transition: all 0.3s ease;
    }
    
    .form-control:focus {
      box-shadow: 0 0 0 2px var(--primary-color);
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff; /* White text on focus */
    }
    
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6); /* Lighter placeholder for contrast */
    }
    
    /* Style for autofill */
    .form-control:-webkit-autofill,
    .form-control:-webkit-autofill:hover, 
    .form-control:-webkit-autofill:focus {
      -webkit-text-fill-color: #ffffff; /* White text for autofill */
      -webkit-box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.08) inset;
      transition: background-color 5000s ease-in-out 0s;
    }
    
    .btn-custom {
      width: 100%;
      border-radius: 20px;
      background: linear-gradient(45deg, var(--primary-color), var(--primary-dark));
      color: #fff;
      font-weight: 600;
      padding: 12px;
      border: none;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    
    .btn-custom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, var(--primary-dark), var(--primary-color));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }
    
    .btn-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 255, 174, 0.3);
    }
    
    .btn-custom:hover::before {
      opacity: 1;
    }
    
    .toggle-links {
      margin-top: 25px;
      text-align: center;
    }
    
    .toggle-link {
      display: block;
      color: var(--primary-color);
      text-decoration: none;
      margin-bottom: 10px;
      transition: all 0.3s ease;
      font-size: 14px;
      position: relative;
    }
    
    .toggle-link:hover {
      color: #fff;
      transform: translateX(5px);
    }
    
    .toggle-link::before {
      content: '→';
      position: absolute;
      left: -15px;
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .toggle-link:hover::before {
      opacity: 1;
      left: -12px;
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
    }
    
    .divider::before {
      margin-right: 10px;
    }
    
    .divider::after {
      margin-left: 10px;
    }
    
    .hidden {
      display: none;
    }
    
    /* Floating elements for visual enhancement */
    .floating-element {
      position: absolute;
      border-radius: 50%;
      background: rgba(0, 255, 174, 0.1);
      filter: blur(5px);
      z-index: -1;
    }
    
    .float-1 {
      width: 100px;
      height: 100px;
      top: 20%;
      left: 10%;
      animation: float 15s ease-in-out infinite;
    }
    
    .float-2 {
      width: 150px;
      height: 150px;
      bottom: 15%;
      right: 10%;
      animation: float 18s ease-in-out infinite reverse;
    }
    
    .float-3 {
      width: 70px;
      height: 70px;
      top: 60%;
      left: 20%;
      animation: float 12s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-20px) translateX(20px);
      }
    }
    
    /* Responsive styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        align-items: flex-start;
        padding-top: 40px;
      }
      
      .auth-container {
        max-width: 100%;
        padding: 0;
      }
      
      .auth-card {
        padding: 25px 20px;
        border-radius: 15px;
      }
      
      .logo h1 {
        font-size: 24px;
      }
      
      .form-control {
        padding: 10px 15px;
        font-size: 16px; /* Prevents zoom on iOS */
      }
      
      .float-1, .float-2, .float-3 {
        display: none;
      }
    }
    
    @media (min-width: 1200px) {
      .auth-container {
        max-width: 500px;
      }
      
      .auth-card {
        padding: 40px;
      }
    }
    
    /* Loading animation for form submission */
    .btn-loading {
      position: relative;
      color: transparent;
    }
    
    .btn-loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Background slides -->
  <div class="bg-slide" style="background-image:url('https://wallpapers.com/images/featured/football-players-hd-emqpbm760h1avxrx.jpg')"></div>
  <div class="bg-slide" style="background-image:url('https://i.pinimg.com/1200x/bc/9c/cf/bc9ccf9190df25d134722842046691b7.jpg')"></div>
  <div class="bg-slide" style="background-image:url('https://wallpaperaccess.com/full/1884497.jpg')"></div>
  <div class="bg-slide" style="background-image:url('https://i.pinimg.com/1200x/12/53/50/125350cbb25384010054cb95962975ba.jpg')"></div>
  <div class="bg-slide" style="background-image:url('https://i.pinimg.com/736x/d1/a1/61/d1a1617521aa6453eb9005f20dbbd5dd.jpg')"></div>
  
  <div class="overlay"></div>
  
  <!-- Floating elements for visual enhancement -->
  <div class="floating-element float-1"></div>
  <div class="floating-element float-2"></div>
  <div class="floating-element float-3"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>Turf Booker</h1>
        <p>Reserve your perfect playing field</p>
      </div>
      
      <h2 id="formTitle">User Login</h2>

      <!-- User Login Form -->
      <form id="userForm" action="LoginServlet" method="post">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" class="form-control" placeholder="User Email" required>
        </div>
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-custom">Login</button>
      </form>

      <!-- Admin Login Form (hidden by default) -->
      <form id="adminForm" class="hidden" action="adminlogin" method="post">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
        </div>
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Admin Password" required>
        </div>
        <button type="submit" class="btn btn-custom">Admin Login</button>
      </form>
      
      <div class="toggle-links">
        <a id="toggleAdmin" class="toggle-link">Admin Login</a>
        <a href="register.html" class="toggle-link">Don't have an account? Register</a>
      </div>
    </div>
  </div>

  <script>
    // Background slideshow
    document.addEventListener("DOMContentLoaded", () => {
      const slides = document.querySelectorAll(".bg-slide");
      let current = 0;
      slides[current].classList.add("active");
      setInterval(() => {
        slides[current].classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].classList.add("active");
      }, 6000);
    });

    // Toggle between User and Admin login
    const toggleAdmin = document.getElementById("toggleAdmin");
    const userForm = document.getElementById("userForm");
    const adminForm = document.getElementById("adminForm");
    const formTitle = document.getElementById("formTitle");

    toggleAdmin.addEventListener("click", () => {
      if (adminForm.classList.contains("hidden")) {
        userForm.classList.add("hidden");
        adminForm.classList.remove("hidden");
        formTitle.innerText = "Admin Login";
        toggleAdmin.innerText = "Back to User Login";
      } else {
        adminForm.classList.add("hidden");
        userForm.classList.remove("hidden");
        formTitle.innerText = "User Login";
        toggleAdmin.innerText = "Admin Login";
      }
    });
    
    // Add loading animation to form buttons
    const forms = document.querySelectorAll('form');
    forms.forEach(form => {
      form.addEventListener('submit', function() {
        const btn = this.querySelector('.btn-custom');
        btn.classList.add('btn-loading');
        btn.disabled = true;
      });
    });
  </script>
</body>
</html>

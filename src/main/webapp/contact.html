<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📞 Contact IMC Turf Academy</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<style>
:root {
  --primary: #00d084;
  --primary-dark: #00b876;
  --primary-light: #00ffcc;
  --dark: #0d1117;
  --darker: #080c12;
  --light: #f8f9fa;
  --gray: #6c757d;
  --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-image: url("https://i.pinimg.com/736x/a0/96/c3/a096c3c5816bf7434b6afb924a33d613.jpg");
  background-size: cover;   /* fills screen */
  background-position: center; /* centers image */
  background-repeat: no-repeat;
  background-attachment: fixed; /* keeps background fixed during scroll */
  min-height: 100vh;  /* makes sure body fills viewport */
  color: #f0f0f0;
  overflow-x: hidden;
  position: relative;
}

/* Animated Gradient Background */
.bg-animated {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0; left: 0;
  z-index: -2;
  background: linear-gradient(45deg, #0d1117, #001f2d, #003366, #0d1117);
  background-size: 600% 600%;
  animation: gradientBG 30s ease infinite;
  filter: blur(70px);
  opacity: 0.8;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Particle canvas */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0; left: 0;
  z-index: -1;
}

/* Header */
header {
  text-align: center;
  padding: 3rem 1rem 2rem;
  background: rgba(13, 17, 23, 0.7);
  backdrop-filter: blur(10px);
  margin-bottom: 2rem;
  border-bottom: 1px solid rgba(0, 208, 132, 0.3);
  box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
}

header h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 3.2rem;
  font-weight: 700;
  margin: 0;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% auto;
  animation: textShine 5s linear infinite, fadeInDown 1s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

@keyframes textShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

header p {
  color: #aaa;
  font-size: 1.2rem;
  margin-top: 0.5rem;
  animation: fadeIn 1s ease 0.3s forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Section Titles */
.section-title {
  text-align: center;
  font-size: 2.2rem;
  color: var(--primary-light);
  margin-bottom: 2rem;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  font-family: 'Montserrat', sans-serif;
}

.section-title::before,
.section-title::after {
  content: '';
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
}

/* Contact Section */
.contact-section {
  max-width: 1200px;
  margin: auto;
  padding: 2rem 1rem;
  position: relative;
  z-index: 1;
  opacity: 0;
  transform: translateY(50px);
  animation: fadeInUp 1s forwards 0.5s;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Contact Flex Layout */
.contact-flex {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: nowrap;
}

.map-container {
  flex: 1;
  min-width: 300px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  transition: var(--transition);
}

.map-container:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(0, 208, 132, 0.3);
}

.map-container iframe {
  width: 100%;
  height: 400px;
  border: none;
  display: block;
  filter: brightness(0.8) contrast(1.2);
}

.form-container {
  flex: 1;
  min-width: 300px;
  background: rgba(13, 17, 23, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 2rem;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 208, 132, 0.2);
  transition: var(--transition);
}

.form-container:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(0, 208, 132, 0.3);
}

/* Form Styling */
.form-group {
  position: relative;
  margin-bottom: 2rem;
}

.form-control {
  background: rgba(17, 17, 17, 0.8);
  border: 2px solid var(--primary);
  color: var(--light);
  padding-left: 3rem;
  height: 50px;
  transition: var(--transition);
  border-radius: 10px;
  font-size: 1rem;
}

.form-control:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 20px var(--primary-light), 0 0 40px var(--primary) inset;
  background: rgba(17, 17, 17, 0.9);
  color: var(--light);
}

textarea.form-control {
  height: 120px;
  padding-top: 0.75rem;
  resize: none;
}

.input-icon {
  position: absolute;
  top: 50%;
  left: 15px;
  transform: translateY(-50%);
  color: var(--primary-light);
  font-size: 1.3rem;
  transition: var(--transition);
  z-index: 2;
}

.form-control:focus + .input-icon {
  color: var(--primary);
  transform: translateY(-50%) scale(1.2);
}

.form-control::placeholder {
  color: #777;
  opacity: 1;
  transition: var(--transition);
}

.form-control:focus::placeholder {
  color: var(--primary-light);
  opacity: 0.7;
}

/* Button Animation */
.btn-submit {
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  color: var(--darker);
  font-weight: 600;
  border: none;
  padding: 0.8rem 2.5rem;
  transition: var(--transition);
  border-radius: 50px;
  box-shadow: 0 5px 15px rgba(0, 208, 132, 0.4);
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 1.1rem;
}

.btn-submit:hover {
  background: linear-gradient(90deg, var(--primary-light), var(--primary));
  box-shadow: 0 8px 25px rgba(0, 255, 204, 0.6);
  transform: translateY(-3px);
}

.btn-submit:active {
  transform: translateY(1px);
}

.btn-submit::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: -100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: 0.5s;
}

.btn-submit:hover::after {
  left: 100%;
}

/* Contact Info */
.contact-info {
  text-align: center;
  margin-top: 2rem;
  font-size: 1.1rem;
  background: rgba(13, 17, 23, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 1.5rem;
  border: 1px solid rgba(0, 208, 132, 0.2);
}

.contact-info p {
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.contact-info a {
  color: var(--primary-light);
  text-decoration: none;
  transition: var(--transition);
  font-weight: 500;
}

.contact-info a:hover {
  color: var(--primary);
  text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
}

.whatsapp-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(90deg, #25D366, #128C7E);
  color: white;
  padding: 0.5rem 1.2rem;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  transition: var(--transition);
  margin-top: 0.5rem;
}

.whatsapp-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
  color: white;
}

/* Footer */
footer {
  text-align: center;
  padding: 1.5rem;
  margin-top: 3rem;
  background: rgba(13, 17, 23, 0.8);
  backdrop-filter: blur(10px);
  color: #999;
  border-top: 1px solid rgba(0, 208, 132, 0.2);
}

/* Success Message */
#form-success {
  position: fixed;
  top: 20px;
  right: 20px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  color: var(--darker);
  padding: 1rem 1.5rem;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  z-index: 1000;
  display: none;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  animation: slideInRight 0.5s ease;
}

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Responsive Design */
@media (max-width: 992px) {
  .contact-flex {
    flex-direction: column;
    align-items: center;
  }
  
  .map-container, .form-container {
    width: 100%;
  }
  
  header h1 {
    font-size: 2.5rem;
  }
  
  .section-title {
    font-size: 1.8rem;
  }
}

@media (max-width: 768px) {
  header {
    padding: 2rem 1rem;
  }
  
  header h1 {
    font-size: 2rem;
  }
  
  .section-title {
    font-size: 1.6rem;
    flex-direction: column;
    gap: 10px;
  }
  
  .section-title::before,
  .section-title::after {
    flex: 0.3;
  }
  
  .form-container {
    padding: 1.5rem;
  }
  
  .contact-info {
    padding: 1rem;
  }
}

@media (max-width: 576px) {
  header h1 {
    font-size: 1.8rem;
  }
  
  .section-title {
    font-size: 1.4rem;
  }
  
  .form-control {
    padding-left: 2.5rem;
    font-size: 0.9rem;
  }
  
  .input-icon {
    left: 12px;
    font-size: 1.1rem;
  }
  
  .btn-submit {
    padding: 0.7rem 1.8rem;
    font-size: 1rem;
  }
}
</style>
</head>
<body>

<div class="bg-animated"></div>
<canvas id="particles"></canvas>

<header>
  <h1><i class="bi bi-telephone"></i> Contact IMC Turf Academy</h1>
  <p>Reach out for coaching, tournaments, and turf bookings</p>
</header>

<section class="contact-section">
  <div class="container">
    <div class="contact-flex">
      <!-- Map on the left -->
      <div class="map-container">
        <h2 class="section-title"><i class="bi bi-geo-alt"></i> Our Location</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.169592452058!2d78.77530627508897!3d10.798319689351764!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3baaf3b8016cb847%3A0xf0fc48e7f0689edc!2simc%20Lakeviewturf!5e0!3m2!1sen!2sin!4v1756316579224!5m2!1sen!2sin" allowfullscreen="" loading="lazy"></iframe>
      </div>

      <!-- Contact Form on the right -->
      <div class="form-container">
        <h2 class="section-title"><i class="bi bi-chat-dots"></i> Contact Form</h2>
        <form id="contact-form">
          <div class="form-group">
            <input type="text" name="user_name" class="form-control" placeholder="Your Name" required>
            <i class="bi bi-person-fill input-icon"></i>
          </div>
          <div class="form-group">
            <input type="email" name="user_email" class="form-control" placeholder="Your Email" required>
            <i class="bi bi-envelope-fill input-icon"></i>
          </div>
          <div class="form-group">
            <textarea name="message" class="form-control" rows="5" placeholder="Your Message" required></textarea>
            <i class="bi bi-chat-left-text-fill input-icon"></i>
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-submit">
              <i class="bi bi-send-fill"></i> Send Message
            </button>
          </div>
        </form>
      </div>
    </div>
    
    <div class="contact-info mt-5">
      <p><i class="bi bi-telephone"></i> Phone: <a href="tel:+9197886867714">+91 97886867714</a></p>
      <p><i class="bi bi-chat"></i> WhatsApp: <a href="https://wa.me/9197886867714" target="_blank" class="whatsapp-btn">
        <i class="bi bi-whatsapp"></i> Chat with us
      </a></p>
    </div>
  </div>
</section>

<div id="form-success">
  <i class="bi bi-check-circle-fill"></i> Message sent successfully!
</div>

<footer>
  <p>© 2025 IMC Turf Academy | Designed with <i class="bi bi-heart-fill text-danger"></i> Passion</p>
</footer>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3.2.0/dist/email.min.js"></script>

<script>
// Initialize particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speedX = Math.random() * 3 - 1.5;
    this.speedY = Math.random() * 3 - 1.5;
    this.color = 'rgba(0,255,204,';
    this.alpha = Math.random() * 0.5 + 0.2;
  }
  
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    
    if(this.x > canvas.width || this.x < 0) this.speedX *= -1;
    if(this.y > canvas.height || this.y < 0) this.speedY *= -1;
  }
  
  draw(){
    ctx.fillStyle = this.color + this.alpha + ')';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i = 0; i < 100; i++){
    particlesArray.push(new Particle());
  }
}

function animateParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  for(let i = 0; i < particlesArray.length; i++){
    particlesArray[i].update();
    particlesArray[i].draw();
    
    // Connect particles with lines
    for(let j = i; j < particlesArray.length; j++){
      const dx = particlesArray[i].x - particlesArray[j].x;
      const dy = particlesArray[i].y - particlesArray[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if(distance < 100){
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0,255,204,' + (0.1 - distance/1000) + ')';
        ctx.lineWidth = 0.5;
        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
        ctx.stroke();
      }
    }
  }
  
  requestAnimationFrame(animateParticles);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});

// Initialize EmailJS with your credentials
// Replace these with your actual EmailJS credentials
emailjs.init("YOUR_PUBLIC_KEY"); // Your EmailJS public key

// Form submission
document.getElementById("contact-form").addEventListener("submit", function(e){
  e.preventDefault();
  
  // Show loading state
  const submitBtn = this.querySelector('button[type="submit"]');
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = '<i class="bi bi-arrow-repeat spinner"></i> Sending...';
  submitBtn.disabled = true;
  
  // Send email
  emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
    .then(() => {
      // Show success message
      const successMsg = document.getElementById('form-success');
      successMsg.style.display = 'flex';
      
      // Reset form
      this.reset();
      
      // Reset button
      submitBtn.innerHTML = originalText;
      submitBtn.disabled = false;
      
      // Hide success message after 3 seconds
      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 3000);
    }, (error) => {
      alert("Oops! Something went wrong: " + JSON.stringify(error));
      
      // Reset button
      submitBtn.innerHTML = originalText;
      submitBtn.disabled = false;
    });
});

// Initialize particles and animation
initParticles();
animateParticles();
</script>

</body>
</html>

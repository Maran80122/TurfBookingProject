<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turf Booking - Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00ffae;
    --primary-dark: #00a86b;
    --primary-light: #00ffae;
    --dark: #111;
    --light: #fff;
    --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    background: var(--dark);
    color: var(--light);
    padding: 20px;
  }

  /* Background slides */
  .bg-slide { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background-size: cover; 
    background-position: center; 
    z-index: -2; 
    opacity: 0;
    transform: scale(1); 
    transition: opacity 2s ease-in-out, transform 20s ease; 
  }
  
  .bg-slide.active { 
    opacity: 1; 
    transform: scale(1.1); 
  }

  /* Overlay for better text visibility */
  body::after { 
    content:''; 
    position: fixed; 
    top:0; 
    left:0; 
    width:100%; 
    height:100%;
    background: rgba(0,0,0,0.6); 
    z-index: -1; 
  }

  /* Auth Card */
  .auth-card { 
    width: 100%; 
    max-width: 450px; 
    padding: 35px 30px; 
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1); 
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0, 255, 174, 0.2); 
    color: var(--light); 
    z-index: 10;
    position: relative; 
    border: 1px solid rgba(0, 255, 174, 0.3);
    transition: var(--transition);
    animation: cardEntrance 0.8s ease-out;
  }
  
  @keyframes cardEntrance {
    from {
      opacity: 0;
      transform: translateY(30px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  
  .auth-card:hover { 
    transform: translateY(-5px) scale(1.01); 
    box-shadow: 0 12px 40px rgba(0, 255, 174, 0.4); 
  }

  .auth-card h2 { 
    text-align: center; 
    margin-bottom: 25px; 
    font-weight: 700;
    font-size: 32px; 
    color: var(--primary); 
    text-shadow: 0 0 8px rgba(0, 255, 174, 0.8);
    position: relative;
    padding-bottom: 15px;
  }
  
  .auth-card h2::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 3px;
    background: var(--primary);
    border-radius: 3px;
  }

  /* Form Elements */
  .input-group { 
    margin-bottom: 20px; 
    position: relative;
  }
  
  .input-group-text { 
    background: rgba(255, 255, 255, 0.2); 
    border: none; 
    color: var(--primary); 
    border-radius: 30px 0 0 30px;
    padding: 0.75rem 1rem;
    transition: var(--transition);
  }
  
  .form-control { 
    border-radius: 0 30px 30px 0; 
    background: rgba(255, 255, 255, 0.15); 
    color: var(--light);
    border: 1px solid rgba(0, 255, 174, 0.3); 
    transition: var(--transition);
    padding: 0.75rem 1rem;
    height: auto;
  }
  
  .form-control:focus { 
    border: 1px solid var(--primary); 
    box-shadow: 0 0 15px var(--primary);
    outline: none; 
    background: rgba(255, 255, 255, 0.2); 
  }
  
  .form-control::placeholder {
    color: rgba(255, 255, 255, 0.7);
  }

  /* Password Strength */
  .password-strength-container {
    margin-bottom: 20px;
  }
  
  #passwordStrength { 
    height: 8px; 
    border-radius: 4px; 
    margin-bottom: 8px;
    transition: width 0.3s, background-color 0.3s;
    width: 0%;
  }
  
  .strength-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
  }

  /* Button */
  .btn-custom { 
    width: 100%; 
    border-radius: 30px;
    background: linear-gradient(45deg, var(--primary), var(--primary-dark)); 
    color: var(--light); 
    font-weight: 600;
    padding: 12px;
    border: none;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  
  .btn-custom:hover { 
    background: linear-gradient(45deg, var(--primary-dark), var(--primary));
    transform: translateY(-3px); 
    box-shadow: 0 6px 20px rgba(0, 255, 174, 0.5); 
  }
  
  .btn-custom:active {
    transform: translateY(1px);
  }
  
  .btn-custom::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: 0.5s;
  }
  
  .btn-custom:hover::after {
    left: 100%;
  }

  /* Toggle Link */
  .toggle-link { 
    display: block; 
    text-align: center; 
    margin-top: 20px;
    color: var(--primary); 
    cursor: pointer; 
    transition: var(--transition);
    text-decoration: none;
    font-weight: 500;
  }
  
  .toggle-link:hover { 
    color: var(--light); 
    text-shadow: 0 0 10px var(--primary); 
  }

  /* Particles */
  #particles { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    pointer-events: none; 
    z-index: -1; 
    border-radius: 20px;
    overflow: hidden;
  }
  
  .particle { 
    position: absolute; 
    width: 10px; 
    height: 10px; 
    background: rgba(0, 255, 174, 0.7);
    border-radius: 50%; 
    box-shadow: 0 0 10px rgba(0, 255, 174, 0.7); 
    animation: float 6s linear infinite; 
  }
  
  @keyframes float { 
    0% { 
      transform: translateY(0) translateX(0); 
      opacity: 1;
    }
    50% { 
      transform: translateY(-50px) translateX(20px); 
      opacity: 0.7;
    }
    100% { 
      transform: translateY(0) translateX(-20px); 
      opacity: 1;
    } 
  }

  /* Validation messages */
  .validation-message {
    color: #ff6b6b;
    font-size: 12px;
    margin-top: 5px;
    display: none;
  }

  /* Responsive Design */
  @media (max-width: 576px) {
    .auth-card {
      padding: 25px 20px;
      max-width: 100%;
    }
    
    .auth-card h2 {
      font-size: 26px;
    }
    
    .input-group-text, .form-control {
      padding: 0.6rem 0.8rem;
    }
    
    body {
      padding: 15px;
    }
  }
</style>
</head>
<body>

<!-- Background slides -->
<div class="bg-slide" style="background-image:url('https://i.pinimg.com/736x/b3/fa/82/b3fa82b2585372b958b3d7ea7a9cd6ca.jpg');"></div>
<div class="bg-slide" style="background-image:url('https://i.pinimg.com/1200x/e2/b9/a5/e2b9a5c6a7daaa1943947b93e291b8c1.jpg');"></div>
<div class="bg-slide" style="background-image:url('https://i.pinimg.com/1200x/d8/72/c9/d872c9b7f38e2a68ad62f0ec44a75d9d.jpg');"></div>
<div class="bg-slide" style="background-image:url('https://i.pinimg.com/736x/0d/59/5b/0d595b7a6bf16171c27a58a4b23dd855.jpg');"></div>

<div class="auth-card">
  <h2>Create Account</h2>

  <form id="registerForm" action="register" method="post">
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
      <input type="text" name="name" class="form-control" placeholder="Full Name" required>
    </div>
    
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
      <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
    </div>
    
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
      <input type="email" name="email" id="email" class="form-control" placeholder="Email" required>
    </div>
    
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
      <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    
    <div class="password-strength-container">
      <div id="passwordStrength"></div>
      <div class="strength-labels">
        <span>Weak</span>
        <span>Medium</span>
        <span>Strong</span>
      </div>
    </div>
    
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
      <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
    </div>
    
    <div id="passwordMatch" class="validation-message">Passwords do not match</div>
    
    <button type="submit" class="btn btn-custom">Register Now</button>
    <a href="login.html" class="toggle-link">Already have an account? Login here</a>
  </form>
  

</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  // Background slideshow
  const slides = document.querySelectorAll('.bg-slide');
  let current = 0;
  slides[current].classList.add('active');
  
  setInterval(() => {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 7000);

  // Password strength indicator
  const passwordInput = document.getElementById("password");
  const confirmPasswordInput = document.getElementById("confirmPassword");
  const strengthBar = document.getElementById("passwordStrength");
  const passwordMatch = document.getElementById("passwordMatch");
  
  passwordInput.addEventListener("input", function() {
    const val = passwordInput.value;
    let score = 0;
    
    if(val.length > 0) score++;
    if(val.length >= 8) score++;
    if(/[a-z]/.test(val)) score++;
    if(/[A-Z]/.test(val)) score++;
    if(/\d/.test(val)) score++;
    if(/[@$!%*?&]/.test(val)) score++;
    
    let width = (score/6)*100 + "%";
    let color = "#ff4c4c";
    
    if(score <= 2) color = "#ff4c4c";
    else if(score <= 4) color = "#ffdd00";
    else color = "#00ffae";
    
    strengthBar.style.width = width;
    strengthBar.style.backgroundColor = color;
    
    // Check password match
    checkPasswordMatch();
  });
  
  confirmPasswordInput.addEventListener("input", checkPasswordMatch);
  
  function checkPasswordMatch() {
    if(confirmPasswordInput.value.length > 0) {
      if(passwordInput.value !== confirmPasswordInput.value) {
        passwordMatch.style.display = "block";
        confirmPasswordInput.style.borderColor = "#ff4c4c";
      } else {
        passwordMatch.style.display = "none";
        confirmPasswordInput.style.borderColor = "#00ffae";
      }
    } else {
      passwordMatch.style.display = "none";
      confirmPasswordInput.style.borderColor = "rgba(0, 255, 174, 0.3)";
    }
  }

  // Form validation
  document.getElementById("registerForm").addEventListener("submit", function(e){
    const pass = passwordInput.value;
    const confirm = confirmPasswordInput.value;
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
    
    if(!regex.test(pass)){
      e.preventDefault();
      alert("❌ Password must be at least 8 characters, include uppercase, lowercase, number, and special character!");
      return;
    }
    
    if(pass !== confirm){
      e.preventDefault();
      alert("❌ Passwords do not match!");
      return;
    }
  });

  // Particle effect
  const particlesContainer = document.getElementById("particles");
  for(let i = 0; i < 25; i++){
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random()*100 + "%";
    p.style.top = Math.random()*100 + "%";
    p.style.width = 5 + Math.random()*10 + "px";
    p.style.height = 5 + Math.random()*10 + "px";
    p.style.animationDuration = 4 + Math.random()*4 + "s";
    p.style.animationDelay = Math.random()*2 + "s";
    particlesContainer.appendChild(p);
  }
});
</script>
</body>
</html>
